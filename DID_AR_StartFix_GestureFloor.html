<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>DID AR • 실측 고정(55인치/1900mm) • Start Fix + 제스처 & 바닥맞춤</title>
<style>
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
  #uiTop { position:fixed; top:0; left:0; right:0; z-index:10; padding:10px; display:flex; gap:8px; flex-wrap:wrap;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
        background:linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,0)); }
  .btn { color:#fff; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.2); border-radius:10px; padding:8px 12px; }
  .btn.active { background:rgba(0,150,255,.45); border-color:rgba(0,150,255,.7); }
  .group { display:flex; align-items:center; gap:6px; color:#fff; }
  input[type="range"] { width:160px; }
  #hint { position:fixed; left:0; right:0; bottom:80px; color:#fff; text-align:center; text-shadow:0 1px 2px #000; z-index:9; }
  #tray { position:fixed; left:0; right:0; bottom:0; z-index:11; background:rgba(0,0,0,.65); backdrop-filter: blur(6px);
           border-top:1px solid rgba(255,255,255,.15); padding:8px 10px; display:flex; align-items:center; gap:10px; overflow-x:auto; }
  #tray .thumb { width:80px; height:48px; flex:0 0 auto; border-radius:8px; border:2px solid rgba(255,255,255,.25); overflow:hidden; position:relative; }
  #tray .thumb img { width:100%; height:100%; object-fit:cover; display:block; }
  #tray .thumb.active { border-color:#4fc3ff; box-shadow:0 0 0 2px rgba(79,195,255,.5) inset; }
  #fileInput { display:none; }
  #fileLabel { color:#fff; border:1px dashed rgba(255,255,255,.35); padding:8px 12px; border-radius:10px; flex:0 0 auto; }
  #applySelBox { color:#fff; display:flex; align-items:center; gap:6px; margin-left:auto; margin-right:6px; }
  #lockBox { color:#fff; display:flex; align-items:center; gap:6px; }
  #scaleRange:disabled { opacity:0.35; }

  /* Big floating start button */
  #fab { position:fixed; right:16px; bottom:96px; z-index:20; padding:14px 18px; border-radius:999px;
         font-weight:700; background:#2ea043; color:#fff; border:none; box-shadow:0 6px 24px rgba(0,0,0,.35); }
  #fab.hidden { display:none; }

  /* Warning banner */
  #warn { position:fixed; top:50px; left:0; right:0; z-index:12; text-align:center; color:#fff; }
  #warn > span { background:rgba(200,50,50,.9); padding:6px 10px; border-radius:8px; }

  #note { position:fixed; left:0; right:0; bottom:130px; color:#fff; text-align:center; z-index:9; font-size:14px; opacity:.9; }
</style>
</head>
<body>
<div id="uiTop">
  <button id="btnModeWall" class="btn active">벽걸이형(55")</button>
  <button id="btnModeTotem" class="btn">스탠드(1900mm)</button>

  <button id="btnBlack" class="btn active">블랙</button>
  <button id="btnWhite" class="btn">화이트</button>

  <div id="lockBox"><input type="checkbox" id="lockScale" checked/><label for="lockScale">실측 고정</label></div>
  <div class="group">스케일 <input id="scaleRange" type="range" min="50" max="150" value="100" disabled> <span id="scaleVal">100%</span></div>
  <div class="group">원지름 <input id="ringRange" type="range" min="20" max="150" value="80"> <span id="ringVal">80cm</span></div>
  <div class="group">높이 <input id="heightRange" type="range" min="0" max="1200" value="0"> <span id="heightVal">0mm</span></div>

  <button id="clearAll" class="btn">전체삭제</button>
</div>

<div id="note">제스처: <b>탭=배치</b> • <b>길게=선택</b> • <b>두손가락 드래그=이동</b> • <b>핀치=크기</b></div>
<div id="hint">AR 시작(아래 초록 버튼) → 트레이에서 이미지 선택/추가 후 배치</div>

<!-- Bottom tray: gallery thumbnails + upload + apply to selected -->
<div id="tray">
  <div id="thumbs"></div>
  <label id="fileLabel" for="fileInput">이미지 추가</label>
  <input id="fileInput" type="file" accept="image/*" multiple/>
  <div id="applySelBox">
    <input type="checkbox" id="applySelected"/>
    <label for="applySelected">선택 기기에 적용</label>
  </div>
</div>

<button id="fab">AR 시작</button>
<div id="warn" style="display:none;"><span>이 브라우저/환경에선 WebXR AR이 비활성화일 수 있어요. HTTPS·권한·지원 브라우저 확인!</span></div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { ARButton } from 'https://unpkg.com/three@0.160.0/examples/jsm/webxr/ARButton.js';

// Basic renderer/scene
const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera();
scene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 1.2));
const dir = new THREE.DirectionalLight(0xffffff, 0.9);
dir.position.set(0.5, 1, 0.3); scene.add(dir);

// States
let scalePct = 1.0, raiseMM = 0, ringCM = 80;
let placed = []; let mode = 'wall'; let selectedObj = null;
let draggingReticle = false; let longPressTimer = null;

// Two-finger gesture states
let isTwoFinger = false;
let pinchStartDist = 0;
let pinchStartScale = 1.0;
function distance2(t0, t1){
  const dx = t0.clientX - t1.clientX, dy = t0.clientY - t1.clientY;
  return Math.hypot(dx, dy);
}

// Materials
const loader = new THREE.TextureLoader();
let bodyMat  = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6, metalness: 0.35 });
let screenDefaultTex = loader.load('https://picsum.photos/800/450?blur=0'); screenDefaultTex.colorSpace = THREE.SRGBColorSpace;
function newScreenMat(){
  return new THREE.MeshStandardMaterial({
    map: screenDefaultTex, roughness: 0.45, metalness: 0.0,
    emissive: 0x111111, emissiveIntensity: 0.35
  });
}
function ensureScreenMat(group){
  const scr = group.userData.screenMesh; return scr ? scr.material : null;
}

// Reticle
let ringRadiusM = (ringCM/100)/2;
const ringGroup = new THREE.Group();
const ringFillMat = new THREE.MeshBasicMaterial({ color: 0x4fc3ff, transparent:true, opacity:0.15 });
const ringEdgeMat = new THREE.MeshBasicMaterial({ color: 0x4fc3ff });
let ringFill = new THREE.Mesh(new THREE.CircleGeometry(ringRadiusM, 64).rotateX(-Math.PI/2), ringFillMat);
let ringEdge = new THREE.Mesh(new THREE.RingGeometry(ringRadiusM*0.95, ringRadiusM, 64).rotateX(-Math.PI/2), ringEdgeMat);
ringGroup.add(ringFill); ringGroup.add(ringEdge); ringGroup.visible = false; scene.add(ringGroup);
const retGeo = new THREE.RingGeometry(0.035, 0.05, 32).rotateX(-Math.PI/2);
const retMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const reticle = new THREE.Mesh(retGeo, retMat);
reticle.matrixAutoUpdate = false; reticle.visible = false; scene.add(reticle);

// Models (origin at bottom so they rest on the floor)
function makeWall(){
  const k = 1.0 * scalePct;
  const bodyW=1.23*k, bodyH=0.69*k, bodyD=0.05*k;
  const screenW=1.205*k, screenH=0.678*k;
  const g = new THREE.Group();
  // body: bottom at y=0 -> center at bodyH/2
  const body = new THREE.Mesh(new THREE.BoxGeometry(bodyW,bodyH,bodyD), bodyMat);
  body.position.y = bodyH/2; g.add(body);
  const sm = newScreenMat();
  const scr = new THREE.Mesh(new THREE.PlaneGeometry(screenW,screenH), sm);
  scr.position.z = bodyD/2 + 0.002; scr.position.y = bodyH/2; g.add(scr);
  g.userData.screenMesh = scr;
  g.userData.type = 'wall';
  g.userData.baseHeight = bodyH; // for scaling compensation
  return g;
}
function makeTotem(){
  const k = 1.0 * scalePct;
  const bodyW=0.74*k, bodyH=1.90*k, bodyD=0.12*k;
  const baseDepth=0.4976*k, baseThick=0.05*k, baseW=bodyW*1.15;
  const screenW= bodyW*0.88, screenH= bodyH*0.72;
  const g = new THREE.Group();
  const base = new THREE.Mesh(new THREE.BoxGeometry(baseW, baseThick, baseDepth), bodyMat);
  base.position.y = baseThick/2; g.add(base);
  const body = new THREE.Mesh(new THREE.BoxGeometry(bodyW, bodyH, bodyD), bodyMat);
  body.position.y = baseThick + bodyH/2; g.add(body);
  const sm = newScreenMat();
  const scr = new THREE.Mesh(new THREE.PlaneGeometry(screenW, screenH), sm);
  scr.position.z = bodyD/2 + 0.002;
  scr.position.y = baseThick + bodyH*0.54; g.add(scr);
  g.userData.screenMesh = scr;
  g.userData.type = 'totem';
  g.userData.baseHeight = baseThick + bodyH; // total height from floor
  return g;
}

// UI refs
const $ = (id)=> document.getElementById(id);
const setActive = (on, offs)=>{ $(on).classList.add('active'); offs.forEach(i=>$(i).classList.remove('active')); };

// Mode/color
$('btnModeWall').onclick = ()=>{ mode='wall'; setActive('btnModeWall',['btnModeTotem']); };
$('btnModeTotem').onclick = ()=>{ mode='totem'; setActive('btnModeTotem',['btnModeWall']); };
$('btnBlack').onclick = ()=>{ bodyMat.color.set(0x111111); setActive('btnBlack',['btnWhite']); };
$('btnWhite').onclick = ()=>{ bodyMat.color.set(0xf2f2f2); setActive('btnWhite',['btnBlack']); };

// Scale lock
const lockScale = $('lockScale'); const scaleRange = $('scaleRange'); const scaleVal = $('scaleVal');
function applyScaleLock(){
  if (lockScale.checked){ scalePct = 1.0; scaleRange.value=100; scaleVal.textContent='100%'; scaleRange.disabled = true; }
  else { scaleRange.disabled = false; }
}
lockScale.onchange = applyScaleLock; applyScaleLock();
scaleRange.oninput = ()=>{ scalePct = parseInt(scaleRange.value,10)/100; scaleVal.textContent = scaleRange.value + '%'; };

// Ring/Height
$('ringRange').oninput = ()=>{
  ringCM = parseInt($('ringRange').value,10); $('ringVal').textContent = ringCM + 'cm';
  ringRadiusM = (ringCM/100)/2;
  ringGroup.remove(ringFill, ringEdge);
  ringFill.geometry.dispose(); ringEdge.geometry.dispose();
  ringFill = new THREE.Mesh(new THREE.CircleGeometry(ringRadiusM, 64).rotateX(-Math.PI/2), ringFillMat);
  ringEdge = new THREE.Mesh(new THREE.RingGeometry(ringRadiusM*0.95, ringRadiusM, 64).rotateX(-Math.PI/2), ringEdgeMat);
  ringGroup.add(ringFill); ringGroup.add(ringEdge);
};
$('heightRange').oninput = ()=>{
  raiseMM = parseInt($('heightRange').value,10); $('heightVal').textContent = raiseMM + 'mm';
  const raiseM = raiseMM/1000; const target = selectedObj || placed[placed.length-1]; if (target) target.position.y = (target.userData._planeY || 0) + raiseM;
};

// Clear
$('clearAll').onclick = ()=>{ placed.forEach(o=>scene.remove(o)); placed.length=0; selectedObj=null; };

// Gallery uploads
const thumbsBox = document.getElementById('thumbs');
function addThumb(url, id, makeActive=false){
  const d = document.createElement('div'); d.className = 'thumb';
  const img = document.createElement('img'); img.src = url; d.appendChild(img);
  d.dataset.tid = id;
  d.onclick = ()=>{
    document.querySelectorAll('#tray .thumb').forEach(t=> t.classList.toggle('active', t===d));
    const tex = loader.load(url); tex.colorSpace = THREE.SRGBColorSpace; screenDefaultTex = tex;
    if (selectedObj && $('applySelected').checked){
      const mat = ensureScreenMat(selectedObj); if (mat){ mat.map = tex; mat.needsUpdate = true; }
    }
  };
  thumbsBox.appendChild(d);
  if (makeActive) d.click();
}
// default thumbs
addThumb('https://picsum.photos/800/450?random=1', 'builtin1', true);
addThumb('https://picsum.photos/800/450?random=2', 'builtin2', false);
document.getElementById('fileInput').onchange = (e)=>{
  const files = Array.from(e.target.files||[]);
  files.forEach((f,i)=>{ const url = URL.createObjectURL(f); addThumb(url, 'user_'+i, i===0); });
};

// AR start via big FAB
const fab = document.getElementById('fab');
let arBtn = null;
fab.onclick = ()=>{
  if (!('xr' in navigator) || !self.isSecureContext){
    document.getElementById('warn').style.display = 'block';
  }
  if (!arBtn){
    arBtn = ARButton.createButton(renderer, { requiredFeatures: ['hit-test'] });
    arBtn.style.display = 'none'; // hide native
    document.body.appendChild(arBtn);
  }
  arBtn.click();
  setTimeout(()=>{ fab.classList.add('hidden'); }, 500);
};

// AR loop & hit-test
let transientSource = null, hitSource = null, requested = false;
renderer.setAnimationLoop((_, frame)=>{
  if (frame){
    const ref = renderer.xr.getReferenceSpace();
    const session = renderer.xr.getSession();
    if (!requested && session){
      session.requestReferenceSpace('viewer').then(view=>{
        session.requestHitTestSource({ space:view }).then(src=>{ hitSource = src; });
      });
      session.requestHitTestSourceForTransientInput({ profile: 'generic-touchscreen' })
             .then(src=>{ transientSource = src; })
             .catch(_=>{});
      session.addEventListener('end', ()=>{ requested=false; hitSource=null; transientSource=null; fab.classList.remove('hidden'); });
      requested = true;
    }
    if (hitSource && !draggingReticle){
      const hits = frame.getHitTestResults(hitSource);
      if (hits.length){
        const pose = hits[0].getPose(ref);
        reticle.visible = true; reticle.matrix.fromArray(pose.transform.matrix);
        ringGroup.visible = true;
        ringGroup.position.setFromMatrixPosition(reticle.matrix);
        ringGroup.quaternion.setFromRotationMatrix(reticle.matrix);
      } else { reticle.visible = false; ringGroup.visible = false; }
    }
    // two-finger drag: move selected along plane
    if (isTwoFinger && selectedObj && transientSource){
      const thits = frame.getHitTestResultsForTransientInput(transientSource);
      if (thits.length){
        const results = thits[0].results;
        if (results && results.length){
          const pose = results[0].getPose(ref);
          const planeY = selectedObj.userData._planeY ?? 0;
          const raiseM = (raiseMM||0)/1000;
          selectedObj.position.set(pose.transform.position.x, planeY + raiseM, pose.transform.position.z);
        }
      }
    }
  }
  renderer.render(scene, camera);
});

// Place/select + floor alignment
function addObjectAtReticle(){
  if (!reticle.visible) return;
  const g = (mode==='wall') ? makeWall() : makeTotem();
  // Set on plane (floor): derive planeY from reticle
  const m = new THREE.Matrix4(); m.copy(reticle.matrix);
  const p = new THREE.Vector3().setFromMatrixPosition(m);
  const q = new THREE.Quaternion().setFromRotationMatrix(m);
  g.position.set(p.x, p.y + (raiseMM/1000), p.z);
  g.quaternion.copy(q);
  // lock Y as plane level for later gestures
  g.userData._planeY = p.y;
  scene.add(g);
  placed.push(g);
  return g;
}

const PICK_DIST = 1.2;
const el = renderer.domElement;
el.addEventListener('touchstart', (ev)=>{
  draggingReticle = false;
  if (ev.touches.length === 1){
    // one-finger: prepare long-press for selection
    selectedObj = null;
    longPressTimer = setTimeout(()=>{
      let minD=1e9, pick=null;
      placed.forEach(o=>{ const d = camera.position.distanceTo(o.position); if (d<minD){ minD=d; pick=o; } });
      if (pick && minD < PICK_DIST) selectedObj = pick;
      else draggingReticle = true;
    }, 250);
  } else if (ev.touches.length === 2){
    // two-finger: enter move/scale
    clearTimeout(longPressTimer);
    isTwoFinger = true;
    if (!selectedObj){
      let minD=1e9, pick=null;
      placed.forEach(o=>{ const d = camera.position.distanceTo(o.position); if (d<minD){ minD=d; pick=o; } });
      if (pick && minD < PICK_DIST) selectedObj = pick;
    }
    pinchStartDist = distance2(ev.touches[0], ev.touches[1]);
    pinchStartScale = scalePct;
  }
},{passive:true});

el.addEventListener('touchmove', (ev)=>{
  if (isTwoFinger && ev.touches.length === 2){
    // pinch -> scale group uniformly; keep bottom on plane by compensating Y
    const curDist = distance2(ev.touches[0], ev.touches[1]);
    if (pinchStartDist > 0){
      let s = pinchStartScale * (curDist / pinchStartDist);
      s = Math.max(0.5, Math.min(1.5, s));
      scalePct = s;
      if (selectedObj){
        // compute height based on type and scale, then keep bottom at plane
        const t = selectedObj.userData.type || 'wall';
        let baseH = selectedObj.userData.baseHeight || 1.0;
        const planeY = selectedObj.userData._planeY ?? 0;
        const raiseM = (raiseMM||0)/1000;
        // replace model for accurate screen scaling (not just .scale): rebuild
        const pos = selectedObj.position.clone();
        const quat = selectedObj.quaternion.clone();
        scene.remove(selectedObj);
        const g = (t==='wall') ? makeWall() : makeTotem();
        g.position.set(pos.x, planeY + raiseM, pos.z);
        g.quaternion.copy(quat);
        g.userData._planeY = planeY;
        scene.add(g);
        const idx = placed.indexOf(selectedObj);
        if (idx>=0){ placed[idx]=g; }
        selectedObj = g;
      }
    }
  }
},{passive:true});

el.addEventListener('touchend', (ev)=>{
  if (ev.touches.length === 0){
    clearTimeout(longPressTimer);
    if (!isTwoFinger){
      // short tap -> place
      addObjectAtReticle();
    }
    isTwoFinger = false;
  } else if (ev.touches.length === 1){
    isTwoFinger = false;
  }
},{passive:true});

// Clear button
$('clearAll').addEventListener('click', ()=>{
  placed.forEach(o=>scene.remove(o)); placed.length=0; selectedObj=null;
});

// Color & mode buttons
$('btnModeWall').addEventListener('click', ()=>{ mode='wall'; setActive('btnModeWall',['btnModeTotem']); });
$('btnModeTotem').addEventListener('click', ()=>{ mode='totem'; setActive('btnModeTotem',['btnModeWall']); });
$('btnBlack').addEventListener('click', ()=>{ bodyMat.color.set(0x111111); setActive('btnBlack',['btnWhite']); });
$('btnWhite').addEventListener('click', ()=>{ bodyMat.color.set(0xf2f2f2); setActive('btnWhite',['btnBlack']); });

window.addEventListener('resize', ()=> renderer.setSize(window.innerWidth, window.innerHeight));
</script>
</body>
</html>
